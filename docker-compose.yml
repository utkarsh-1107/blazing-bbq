version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: blazing_bbq_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${DB_NAME:-blazing_bbq}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blazing_bbq_network

  # Express.js API Server
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: blazing_bbq_server
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/blazing_bbq
      JWT_SECRET: ${JWT_SECRET:-blazing-bbq-super-secret-jwt-key-min-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_XXXXXXXXXXXXXX}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-XXXXXXXXXXXXXXXXXXXX}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-XXXXXXXXXXXXXXXXXXXX}
      OTP_SECRET: ${OTP_SECRET:-otp-encryption-secret}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - blazing_bbq_network

  # Next.js Client
  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    container_name: blazing_bbq_client
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_XXXXXXXXXXXXXX}
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - blazing_bbq_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: blazing_bbq_nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - client
      - server
    restart: unless-stopped
    networks:
      - blazing_bbq_network

volumes:
  postgres_data:

networks:
  blazing_bbq_network:
    driver: bridge
